<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Sightline</h1>
    <button id="startBtn" aria-label="Start listening">🎤 Start Listening</button>
    <button id="stopBtn" aria-label="Stop listening" disabled>⏹️ Stop</button>
    <button id="hoverToggleBtn" aria-label="Toggle hover voice preview" class="secondary-btn">🔇 Hover Voice: Off</button>
    <button id="openWebUiBtn" aria-label="Open agent web ui" class="secondary-btn">🤖 Open Agent Web UI</button>
    
    <div id="status" class="status">Ready to listen for voice commands</div>
    <div id="transcript" class="transcript"></div>
    <div id="feedback" class="feedback"></div>
    <div id="micHelp" class="mic-help hidden">
      <p>Microphone access is blocked. Enable it in Chrome settings, then try again.</p>
      <button id="openMicSettingsBtn" class="secondary-btn" type="button">Open Microphone Settings</button>
    </div>
    
    <div class="help-text">
      <p>Say things like:</p>
      <ul>
        <li>"Read the page"</li>
        <li>"Click the first link"</li>
        <li>"Search for puppies"</li>
        <li>"Scroll down"</li>
      </ul>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
